services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
    env_file:
      - apps/web/.env
    environment:
      DATABASE_URL: "file:./prisma/data/vectorops.db"
      # Production seed — runs once on first deploy when SEED_ADMIN_EMAIL is set.
      # Remove or leave unset after the initial deployment.
      # SEED_ADMIN_NAME: "Your Name"
      # SEED_ADMIN_EMAIL: "admin@yourcompany.com"
      # SEED_ADMIN_PASSWORD: "ChangeMe123!"
    ports:
      - "3005:3000"
    volumes:
      # Named volume so Docker manages directory ownership (avoids permission
      # errors that occur when a bind-mount is created as root on the host
      # while the container runs as the non-root "node" user).
      - vectorops-data:/app/apps/web/prisma/data
    init: true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  vectorops-data:
